name: "CodeQL"

on:
  push:
    branches: [main, master, develop, regression-audit]
    paths-ignore:
      - "**/*.php"
      - "**/*.md"
  pull_request:
    branches: [main, master, develop, regression-audit]
    paths-ignore:
      - "**/*.php"
      - "**/*.md"
  schedule:
    - cron: "30 1 * * 1"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["c-cpp", "java-kotlin", "javascript-typescript", "python"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v3
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@7188fc363630916deb702c7fdcf4e481b751f97a # v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v3
        with:
          category: "/language:${{ matrix.language }}"
