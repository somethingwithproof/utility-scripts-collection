name: Dependabot Auto-Merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: read

concurrency:
  group: dependabot-auto-merge
  cancel-in-progress: false

jobs:
  merge:
    if: github.event_name != 'pull_request_target' || github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Merge Dependabot pull requests with successful checks
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --author "app/dependabot" \
            --json number,isDraft,mergeable \
            --jq '.[] | select(.isDraft == false and .mergeable == "MERGEABLE") | .number' |
          while read -r pr; do
            [ -n "$pr" ] || continue

            states=$(gh pr checks "$pr" \
              --repo "$GITHUB_REPOSITORY" \
              --json state \
              --jq '.[].state' 2>/dev/null || true)

            # Fail closed when a repository has no CI checks.
            [ -n "$states" ] || continue

            if grep -Eq '^(PENDING|QUEUED|IN_PROGRESS|FAILURE|ERROR|CANCELLED|STALE|ACTION_REQUIRED)$' <<<"$states"; then
              continue
            fi

            gh pr merge "$pr" \
              --repo "$GITHUB_REPOSITORY" \
              --squash \
              --delete-branch
          done
